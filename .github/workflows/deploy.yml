name: Mirror & Deploy

on:
    push:
        branches: [main]

jobs:
    mirror:
        name: Mirror code to jojo66669
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'kungfubozo/DoggyLog' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pixta-dev/repository-mirroring-action@v1
              with:
                  target_repo_url: git@github.com:jojo66669/DoggyLog.git
                  ssh_private_key: ${{ secrets.MIRROR_SSH_KEY }}

    deploy:
        name: Build & Deploy to jojo66669 GitHub Pages
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'kungfubozo/DoggyLog' }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install
              run: npm ci

            - name: Build
              run: npm run build

            - name: Deploy to jojo66669
              uses: peaceiris/actions-gh-pages@v4
              with:
                  personal_token: ${{ secrets.ACCOUNT2_PAT_TOKEN }}
                  external_repository: jojo66669/DoggyLog
                  publish_dir: ./dist
                  user_name: github-actions[bot]
                  user_email: github-actions[bot]@users.noreply.github.com
